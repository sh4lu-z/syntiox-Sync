<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA SESSION</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="mesh-bg"><div class="blob b1"></div><div class="blob b2"></div></div>
    
    <div class="aura-card" id="tilt-card">
        <h1>AURA GATEWAY</h1>
        <p class="sub-text">System Secured</p>
        
        <div class="toggle-box">
            <button class="t-btn active" onclick="switchTab('qr')">QR SCAN</button>
            <button class="t-btn" onclick="switchTab('pair')">PAIR CODE</button>
        </div>

        <div id="qr-view" class="view-section active">
            <div id="qr-container" class="qr-box"></div>
            <button class="action-btn" onclick="startQR()" id="qr-btn">START SESSION</button>
        </div>

        <div id="pair-view" class="view-section">
            <input type="text" class="aura-input" placeholder="947xxxxxxxx" id="phone">
            <button class="action-btn" onclick="startPairing()" id="pair-btn">GET CODE</button>
            <div id="code-result" class="code-res"></div>
        </div>
    </div>

    <div class="nav-dock">
        <a href="dev/dev.html" class="nav-btn dev-opt">
            <i class="fa-solid fa-code"></i> Developer API Docs
        </a>
    </div>

    <script src="config.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
