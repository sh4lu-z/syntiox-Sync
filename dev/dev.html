<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | DEVELOPER CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .dev-terminal {
            background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px;
            font-family: monospace; color: #0f0; text-align: left; height: 200px; overflow-y: auto; margin-bottom: 20px;
        }
        .dev-btn { width: auto; padding: 10px 20px; font-size: 0.8rem; background: #333; color: #fff; display: inline-block; margin: 5px; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    
    <div class="aura-card">
        <h1><i class="fa-solid fa-code"></i> DEV TOOLS</h1>
        <p class="sub-text">System Diagnostics & Logs</p>

        <div class="dev-terminal" id="console-output">
            > System Initialized...<br>
            > Waiting for commands...
        </div>

        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="action-btn dev-btn" onclick="checkServerStatus()">PING SERVER</button>
            <button class="action-btn dev-btn" onclick="clearLocalData()">CLEAR CACHE</button>
            <button class="action-btn dev-btn" onclick="testDB()">TEST MONGODB</button>
        </div>

        <br>
        <a href="../index.html" class="nav-btn" style="justify-content: center; background: rgba(255,255,255,0.1);">
            <i class="fa-solid fa-arrow-left"></i> Back to Gateway
        </a>
    </div>

    <script src="../config.js"></script>
    <script src="dev-script.js"></script>
</body>
</html>
